<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b1e24"/>
      <stop offset="100%" style="stop-color:#0a0b0d"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8fa5a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c6f432;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Volt radial glow behind bolt -->
  <circle cx="256" cy="266" r="150" fill="#c6f432" opacity="0.10"/>
  <!-- Lightning bolt -->
  <path d="M296 80 L176 288 H248 L216 432 L336 224 H264 Z" fill="url(#bolt)" filter="url(#glow)"/>
</svg>
