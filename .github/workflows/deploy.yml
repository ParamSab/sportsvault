name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual deploy'

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Apply database migrations
        timeout-minutes: 5
        run: |
          set -a; source .vercel/.env.production.local; set +a
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not found in Vercel env — skipping migrations"
            exit 0
          fi
          # Targeted idempotent SQL via the session pooler (port 5432).
          # `prisma db push` is forbidden on this DB: it would drop the live
          # snake_case Supabase-fallback tables (users, saved_games, game_rsvps).
          DB="${DATABASE_URL/:6543\//:5432/}"
          DB="${DB/?pgbouncer=true/}"
          for f in prisma/manual-migrations/*.sql; do
            echo "Applying $f"
            psql "$DB" -v ON_ERROR_STOP=1 -f "$f"
          done
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"
