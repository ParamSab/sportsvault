name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual deploy'

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Sync database schema to Supabase
        timeout-minutes: 5
        run: |
          set -a; source .vercel/.env.production.local; set +a
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not found in Vercel env — skipping schema sync"
            exit 0
          fi
          # prisma db push hangs through PgBouncer transaction pooling (port 6543).
          # Switch to Supabase's session pooler on port 5432 for schema changes.
          export DATABASE_URL="${DATABASE_URL/:6543\//:5432/}"
          export DATABASE_URL="${DATABASE_URL/?pgbouncer=true/}"
          npx --yes prisma@5 db push --skip-generate \
            || echo "::warning::Schema sync failed — apply prisma/schema.prisma manually"
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"
